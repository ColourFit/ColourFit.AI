<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ColorFit AI – Personal Stylist</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--v:#4F46E5;--p:#9333EA;--ink:#0D0A1E;--mid:#5B5480;--soft:#9A94BB;--line:rgba(79,70,229,.13)}
body{min-height:100vh;font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#3730A3 0%,#4F46E5 35%,#7C3AED 65%,#9333EA 100%);display:flex;justify-content:center;padding:28px 14px 70px;transition:background 1.2s ease;overflow-x:hidden}

/* FLOATING ORBS */
.orb{position:fixed;border-radius:50%;filter:blur(70px);opacity:.2;pointer-events:none;z-index:0;animation:flt 10s ease-in-out infinite}
.o1{width:300px;height:300px;background:#818CF8;top:-60px;left:-60px}
.o2{width:200px;height:200px;background:#F43F5E;bottom:5%;right:-40px;animation-delay:4s}
.o3{width:150px;height:150px;background:#FBBF24;top:40%;left:2%;animation-delay:7s}
@keyframes flt{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.05)}}

.wrap{width:100%;max-width:700px;position:relative;z-index:1}

/* LOGO */
.logo{text-align:center;margin-bottom:20px;animation:fadeD .6s ease both}
.lpill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.28);border-radius:50px;padding:8px 22px;color:#fff;backdrop-filter:blur(12px)}
.lpill b{font-family:'Syne',sans-serif;font-size:17px;letter-spacing:-.3px}
.lpill span{font-size:20px}

/* CARD */
.card{background:#fff;border-radius:26px;box-shadow:0 32px 80px rgba(49,46,129,.28),0 0 0 1px rgba(255,255,255,.5) inset;overflow:hidden;animation:riseU .7s cubic-bezier(.22,1,.36,1) both;animation-delay:.1s}
.ch{padding:36px 42px 28px;background:linear-gradient(135deg,rgba(79,70,229,.05),rgba(147,51,234,.04));border-bottom:1px solid var(--line)}
.ch h1{font-family:'Syne',sans-serif;font-size:29px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#4F46E5,#9333EA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ch p{color:var(--mid);font-size:14px;margin-top:5px}
.cb{padding:30px 42px 40px}

/* STEPS */
.step{display:none}.step.on{display:block;animation:fadeUp .45s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* FORM */
.fg{margin-bottom:19px}
.lb{display:block;font-size:11.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--soft);margin-bottom:9px}
.gtog{display:flex;border:2px solid var(--line);border-radius:13px;overflow:hidden;background:#F7F6FF}
.gb{flex:1;padding:13px;border:none;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--mid);transition:all .22s;display:flex;align-items:center;justify-content:center;gap:6px}
.gb.on{background:linear-gradient(135deg,#4F46E5,#7C3AED);color:#fff;font-weight:600}
.gb:hover:not(.on){background:rgba(79,70,229,.06)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.inp,.sel{width:100%;padding:12px 15px;border:2px solid var(--line);border-radius:11px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:#FAFBFF;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;appearance:none}
.inp:focus,.sel:focus{border-color:#4F46E5;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.inp::placeholder{color:#C5C0DC}
.selw{position:relative}.selw::after{content:'▾';position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--soft);pointer-events:none;font-size:13px}
.hxrow{position:relative}
.hxdot{position:absolute;right:11px;top:50%;transform:translateY(-50%);width:26px;height:26px;border-radius:7px;border:2px solid rgba(0,0,0,.09);background:#D2A679;transition:background .3s;cursor:pointer}
.hxrow .inp{padding-right:48px}
.err{display:none;color:#EF4444;font-size:12px;margin-top:5px;font-weight:500}
.hint{font-size:12px;color:var(--soft);margin-top:4px}
.bmain{width:100%;padding:15px;border:none;border-radius:13px;background:linear-gradient(135deg,#4F46E5,#7C3AED);color:#fff;font-family:'Syne',sans-serif;font-size:15.5px;font-weight:700;cursor:pointer;margin-top:6px;transition:all .25s;letter-spacing:.2px;position:relative;overflow:hidden}
.bmain::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);opacity:0;transition:opacity .2s}
.bmain:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(79,70,229,.4)}.bmain:hover::after{opacity:1}
.bmain:active{transform:none}

/* LOADING */
.ld{display:none;text-align:center;padding:60px 20px}.ld.on{display:block}
.sp{width:46px;height:46px;margin:0 auto 16px;border:4px solid rgba(79,70,229,.15);border-top-color:#4F46E5;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld p{color:var(--mid);font-size:14px;animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* RESULTS */
.rh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.rh h2{font-family:'Syne',sans-serif;font-size:21px;font-weight:700;color:var(--ink)}
.rh small{font-size:12px;color:var(--soft);display:block;margin-top:3px}
.bghost{padding:9px 18px;border:2px solid var(--line);border-radius:9px;background:transparent;color:var(--mid);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.bghost:hover{border-color:#4F46E5;color:#4F46E5}
.sbadge{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:50px;font-weight:600;font-size:13px;border:2px solid;margin-bottom:14px}
.profile-strip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.ptag{display:flex;align-items:center;gap:5px;padding:6px 12px;background:#F3F4FF;border:1.5px solid rgba(79,70,229,.15);border-radius:20px;font-size:12px;font-weight:600;color:#4F46E5}
.st{font-family:'Syne',sans-serif;font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.cnt{background:linear-gradient(135deg,#4F46E5,#9333EA);color:#fff;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700}

/* PALETTE */
.psec{margin-bottom:28px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:7px}
.sw{aspect-ratio:1;border-radius:9px;border:2px solid rgba(0,0,0,.06);cursor:pointer;position:relative;transition:transform .18s,box-shadow .18s}
.sw:hover{transform:scale(1.2) translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.2);z-index:2}
.tip{display:none;position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);background:rgba(13,10,30,.9);color:#fff;font-size:10px;padding:3px 8px;border-radius:5px;white-space:nowrap;z-index:10;pointer-events:none}
.sw:hover .tip{display:block}

/* AVOID */
.avsec{margin-bottom:24px}
.avrow{display:flex;flex-wrap:wrap;gap:7px}
.avchip{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:20px;font-size:12px;font-weight:500;background:#FFF1F2;color:#BE123C;border:1.5px solid #FECDD3}
.avdot{width:9px;height:9px;border-radius:50%}
.divl{height:1px;background:var(--line);margin:22px 0}

/* ═══════════════════════════════════
   OUTFIT CARDS — REAL IMAGES
═══════════════════════════════════ */
.osec{margin-bottom:26px}
.ogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:15px}

.ocard{border-radius:20px;overflow:hidden;background:#fff;border:2px solid rgba(79,70,229,.08);box-shadow:0 4px 18px rgba(79,70,229,.07);cursor:pointer;transition:transform .24s ease,box-shadow .24s ease,border-color .24s ease}
.ocard:hover{transform:translateY(-7px) scale(1.01);box-shadow:0 20px 50px rgba(79,70,229,.2);border-color:#4F46E5}

/* Image container */
.oimg-wrap{width:100%;height:230px;position:relative;overflow:hidden;background:linear-gradient(135deg,#EEF0FF,#E0E4FF)}

.oimg-wrap img{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  display:block;
  transition:transform .5s ease;
}
.ocard:hover .oimg-wrap img{transform:scale(1.08)}

/* skeleton shimmer while loading */
.oimg-wrap .shimmer{
  position:absolute;inset:0;
  background:linear-gradient(90deg,#EEF0FF 25%,#E0E4FF 50%,#EEF0FF 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  display:flex;align-items:center;justify-content:center;
  font-size:38px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* fit badge */
.fitbadge{position:absolute;top:10px;left:10px;color:#fff;font-size:10px;font-weight:700;padding:4px 9px;border-radius:20px;letter-spacing:.3px;backdrop-filter:blur(6px);z-index:2}

/* color strip at bottom of image */
.cstrip{position:absolute;bottom:0;left:0;right:0;height:6px;display:flex;z-index:2}
.cseg{flex:1}

/* card body */
.oinfo{padding:13px 15px 15px}
.oinfo h4{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:4px;line-height:1.4}
.oinfo p{font-size:11.5px;color:var(--soft);line-height:1.45;margin-bottom:8px}
.cdots{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.cdot{width:15px;height:15px;border-radius:50%;border:2px solid rgba(255,255,255,.9);box-shadow:0 1px 4px rgba(0,0,0,.18)}

/* ACTIONS */
.arow{display:flex;gap:9px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--line)}
.bact{flex:1;padding:11px;border:2px solid var(--line);border-radius:11px;background:#F7F6FF;color:var(--mid);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;min-width:120px}
.bact:hover{border-color:#4F46E5;color:#4F46E5;background:rgba(79,70,229,.04)}
.bact.ok{border-color:#10B981;color:#10B981;background:rgba(16,185,129,.05)}

/* TOAST */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(70px);background:#0D0A1E;color:#fff;padding:11px 22px;border-radius:50px;font-size:13px;font-weight:500;z-index:9999;transition:transform .32s cubic-bezier(.22,1,.36,1);pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0)}

/* ANIMATIONS */
@keyframes fadeD{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes riseU{from{opacity:0;transform:translateY(28px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}

/* RESPONSIVE */
@media(max-width:520px){.g2{grid-template-columns:1fr}.ch,.cb{padding-left:20px;padding-right:20px}.ch h1{font-size:23px}.ogrid{grid-template-columns:1fr 1fr}.rh{flex-direction:column}}
@media(max-width:380px){.ogrid{grid-template-columns:1fr}.oimg-wrap{height:200px}}
</style>
</head>
<body>

<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="orb o3"></div>

<div class="wrap">
  <div class="logo">
    <div class="lpill"><span>✨</span><b>ColorFit AI</b></div>
  </div>

  <div class="card">
    <div class="ch">
      <h1>Personal Stylist</h1>
      <p>Smart outfit picks based on your body type, age &amp; occasion</p>
    </div>
    <div class="cb">

      <!-- ══ STEP 1: FORM ══ -->
      <div class="step on" id="s1">
        <div class="fg">
          <label class="lb">Gender</label>
          <div class="gtog">
            <button class="gb on" id="gM" onclick="setG('male')">👨 Male</button>
            <button class="gb" id="gF" onclick="setG('female')">👩 Female</button>
          </div>
        </div>
        <div class="g2">
          <div class="fg"><label class="lb">Age</label><input type="number" id="iAge" class="inp" placeholder="e.g. 22" min="10" max="80"/></div>
          <div class="fg"><label class="lb">Height (cm)</label><input type="number" id="iH" class="inp" placeholder="e.g. 175" min="140" max="220"/></div>
        </div>
        <div class="g2">
          <div class="fg"><label class="lb">Weight (kg)</label><input type="number" id="iW" class="inp" placeholder="e.g. 68" min="35" max="200"/></div>
          <div class="fg">
            <label class="lb">Occasion</label>
            <div class="selw"><select id="iOcc" class="sel">
              <option value="casual">👕 Casual</option>
              <option value="party">🎉 Party</option>
              <option value="college">🎓 College</option>
              <option value="office">💼 Office</option>
              <option value="wedding">💍 Wedding</option>
              <option value="indian">🪷 Indian Traditional</option>
              <option value="western">🤠 Western</option>
              <option value="arabian">🌙 Arabian</option>
              <option value="korean">🌸 Korean / KPOP</option>
              <option value="japanese">⛩️ Japanese</option>
              <option value="streetwear">🧢 Streetwear</option>
              <option value="travel">✈️ Travel</option>
              <option value="gym">💪 Gym</option>
              <option value="beach">🏖️ Beach</option>
              <option value="formal">🎩 Formal</option>
            </select></div>
          </div>
        </div>
        <div class="fg">
          <label class="lb">Skin Tone HEX <span style="font-weight:400;text-transform:none;color:var(--soft)">(optional)</span></label>
          <div class="hxrow">
            <input type="text" id="iHex" class="inp" placeholder="#D2A679 — your skin tone"/>
            <div class="hxdot" id="hxp"></div>
          </div>
          <div class="err" id="hexErr">⚠ Enter a valid HEX like #D2A679</div>
          <p class="hint">Leave blank → medium tone auto-selected</p>
        </div>
        <button class="bmain" onclick="generate()">✨ Get My Style</button>
      </div>

      <!-- ══ LOADING ══ -->
      <div class="ld" id="ld">
        <div class="sp"></div>
        <p id="ltxt">Analyzing your body type…</p>
      </div>

      <!-- ══ STEP 2: RESULTS ══ -->
      <div class="step" id="s2">
        <div class="rh">
          <div><h2 id="rT">Your Style Profile</h2><small id="rS"></small></div>
          <button class="bghost" onclick="reset()">↩ Start Over</button>
        </div>
        <div id="skinB" class="sbadge"></div>
        <div class="profile-strip" id="profStrip"></div>
        <div class="psec">
          <div class="st">Best Colors for You <span class="cnt" id="cCnt">24</span></div>
          <div class="pgrid" id="pGrid"></div>
        </div>
        <div class="avsec">
          <div class="st">Colors to Avoid</div>
          <div class="avrow" id="avRow"></div>
        </div>
        <div class="divl"></div>
        <div class="osec">
          <div class="st" id="outfitTitle">Outfit Picks for You</div>
          <div class="ogrid" id="oGrid"></div>
        </div>
        <div class="arow">
          <button class="bact" id="cpyB" onclick="copyR()">📋 Copy Results</button>
          <button class="bact" onclick="reset()">🔄 Try Again</button>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════
   STATE & HELPERS
════════════════════════════════════ */
var ST={gender:'male',age:22,height:175,weight:68,occasion:'casual',hex:'#D2A679'};

function setG(g){
  ST.gender=g;
  document.getElementById('gM').classList.toggle('on',g==='male');
  document.getElementById('gF').classList.toggle('on',g==='female');
}

document.getElementById('iHex').addEventListener('input',function(){
  var v=this.value.trim();
  if(/^#[0-9A-Fa-f]{6}$/.test(v)){
    document.getElementById('hxp').style.background=v;
    setBg(v);
  }
});

function setBg(h){
  var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16),hh=toHue(r,g,b);
  document.body.style.background='linear-gradient(135deg,hsl('+hh+',62%,24%) 0%,hsl('+((hh+28)%360)+',58%,36%) 55%,hsl('+((hh+55)%360)+',54%,44%) 100%)';
}
function toHue(r,g,b){
  r/=255;g/=255;b/=255;
  var mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn,h=0;
  if(!d)return 200;
  if(mx===r)h=((g-b)/d)%6;else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;
  return Math.round(h*60+360)%360;
}
function validHex(h){return/^#[0-9A-Fa-f]{6}$/.test(h);}
function toRgb(hex){return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};}
function bright(r,g,b){return(r*299+g*587+b*114)/1000;}
function skinTone(b){return b>=200?'fair':b>=140?'medium':'dark';}
function getBMI(h,w){return w/((h/100)*(h/100));}
function getBodyType(h,w){var b=getBMI(h,w);return b<18.5?'slim':b<25?'medium':b<30?'heavy':'obese';}
function getFitLabel(bt){return bt==='slim'?'Slim Fit':bt==='medium'?'Regular Fit':bt==='heavy'?'Relaxed Fit':'Oversized Fit';}
function getAgeGroup(a){return a<18?'teen':a<25?'young':a<35?'midyoung':a<50?'adult':'senior';}
function getHeightGroup(h){return h<163?'Petite':h<178?'Average Height':'Tall';}
function getFitColor(f){return f==='Slim Fit'?'rgba(79,70,229,.85)':f==='Regular Fit'?'rgba(5,150,105,.85)':f==='Relaxed Fit'?'rgba(217,119,6,.85)':'rgba(147,51,234,.85)';}

/* ════════════════════════════════════
   COLOR PALETTES
════════════════════════════════════ */
var PAL={
  fair:{
    best:[{h:'#0F4C81',n:'Navy Blue'},{h:'#1A1A2E',n:'Midnight'},{h:'#C41E3A',n:'Crimson'},{h:'#2E8B57',n:'Sea Green'},{h:'#FF6B6B',n:'Coral'},{h:'#FFF8DC',n:'Ivory'},{h:'#B8860B',n:'Dark Gold'},{h:'#4B0082',n:'Indigo'},{h:'#008080',n:'Teal'},{h:'#8B0000',n:'Dark Red'},{h:'#556B2F',n:'Olive'},{h:'#191970',n:'Midnight Blue'},{h:'#D4AF37',n:'Gold'},{h:'#9370DB',n:'Purple'},{h:'#20B2AA',n:'Lt Teal'},{h:'#CD853F',n:'Peru'},{h:'#228B22',n:'Forest'},{h:'#4169E1',n:'Royal Blue'},{h:'#DC143C',n:'Crimson Red'},{h:'#2F4F4F',n:'Dark Slate'},{h:'#8FBC8F',n:'Sea Green'},{h:'#DAA520',n:'Goldenrod'},{h:'#B22222',n:'Firebrick'},{h:'#483D8B',n:'Slate Blue'}],
    avoid:[{h:'#FFD700',n:'Bright Yellow'},{h:'#FFA500',n:'Orange'},{h:'#FFE4E1',n:'Misty Rose'},{h:'#FFFACD',n:'Lemon Chiffon'}]
  },
  medium:{
    best:[{h:'#FFFFFF',n:'White'},{h:'#F5F5DC',n:'Cream'},{h:'#FFD700',n:'Gold'},{h:'#FF6347',n:'Tomato'},{h:'#00CED1',n:'Turquoise'},{h:'#8A2BE2',n:'Blue Violet'},{h:'#32CD32',n:'Lime Green'},{h:'#FF4500',n:'Orange Red'},{h:'#1E90FF',n:'Dodger Blue'},{h:'#FF1493',n:'Deep Pink'},{h:'#00FA9A',n:'Spring Green'},{h:'#FF8C00',n:'Dark Orange'},{h:'#7B68EE',n:'Slate Blue'},{h:'#48D1CC',n:'Turquoise'},{h:'#FA8072',n:'Salmon'},{h:'#40E0D0',n:'Aqua'},{h:'#EE82EE',n:'Violet'},{h:'#90EE90',n:'Lt Green'},{h:'#F08080',n:'Lt Coral'},{h:'#B0C4DE',n:'Steel Blue'},{h:'#AFEEEE',n:'Pale Turq'},{h:'#E6E6FA',n:'Lavender'},{h:'#FFA07A',n:'Lt Salmon'},{h:'#98FB98',n:'Pale Green'}],
    avoid:[{h:'#808080',n:'Grey'},{h:'#A9A9A9',n:'Dark Grey'},{h:'#C0C0C0',n:'Silver'},{h:'#D3D3D3',n:'Lt Grey'}]
  },
  dark:{

/* ════════════════════════════════════
   SMART OUTFIT PICKER
   Scores outfits by body + age match
════════════════════════════════════ */
function pickOutfits(gender, occasion, bodyType, ageGroup){
  var pool=(DB[gender]&&DB[gender][occasion])?DB[gender][occasion]:DB[gender]['casual'];
  var fitLabel=getFitLabel(bodyType);
  var scored=pool.map(function(o){
    var s=0;
    if(!o.forBody||o.forBody.indexOf(bodyType)>-1) s+=4;
    if(!o.forAge ||o.forAge.indexOf(ageGroup)>-1)  s+=2;
    if(o.fit===fitLabel) s+=3;
    return{o:o,s:s};
  });
  scored.sort(function(a,b){return b.s-a.s;});
  var out=[];
  for(var i=0;i<Math.min(4,scored.length);i++) out.push(scored[i].o);
  return out;
}

/* ════════════════════════════════════
   GENERATE
════════════════════════════════════ */
function generate(){
  var hexRaw=document.getElementById('iHex').value.trim()||'#D2A679';
  var hexVal=hexRaw[0]==='#'?hexRaw:'#'+hexRaw;
  if(hexRaw&&!validHex(hexVal)){document.getElementById('hexErr').style.display='block';return;}
  document.getElementById('hexErr').style.display='none';
  ST.age    =parseInt(document.getElementById('iAge').value)||22;
  ST.height =parseInt(document.getElementById('iH').value)||170;
  ST.weight =parseInt(document.getElementById('iW').value)||65;
  ST.occasion=document.getElementById('iOcc').value;
  ST.hex    =hexVal;
  document.getElementById('s1').classList.remove('on');
  document.getElementById('ld').classList.add('on');
  var msgs=['Analyzing your body type…','Finding your best fit style…','Matching colors to skin tone…','Picking outfit combinations…'];
  var i=0,lt=document.getElementById('ltxt');
  var iv=setInterval(function(){i++;if(msgs[i])lt.textContent=msgs[i];},620);
  setTimeout(function(){clearInterval(iv);document.getElementById('ld').classList.remove('on');render();document.getElementById('s2').classList.add('on');},2700);
}

/* ════════════════════════════════════
   RENDER RESULTS
════════════════════════════════════ */
function render(){
  var g=ST.gender,hex=ST.hex,occ=ST.occasion;
  var rgb=toRgb(hex),br=bright(rgb.r,rgb.g,rgb.b),st=skinTone(br);
  var bt=getBodyType(ST.height,ST.weight),ag=getAgeGroup(ST.age),hg=getHeightGroup(ST.height);
  var bmi=getBMI(ST.height,ST.weight).toFixed(1);
  setBg(hex);

  /* title */
  document.getElementById('rT').textContent=g==='male'?'👔 Your Style Profile':'👗 Your Style Profile';
  document.getElementById('rS').textContent=getFitLabel(bt)+' · '+ag+' · BMI '+bmi;

  /* skin badge */
  var SC={fair:{l:'Fair Skin',bg:'#FFF7ED',b:'#FED7AA',d:'#FBBF24',t:'#B45309'},medium:{l:'Medium Skin',bg:'#FEF3C7',b:'#FDE68A',d:'#D97706',t:'#92400E'},dark:{l:'Dark Skin',bg:'#FEF9C3',b:'#FDE047',d:'#8B4513',t:'#713F12'}};
  var sc=SC[st],bdg=document.getElementById('skinB');
  bdg.style.cssText='background:'+sc.bg+';border-color:'+sc.b+';color:'+sc.t+';display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:50px;font-weight:600;font-size:13px;border:2px solid;margin-bottom:14px';
  bdg.innerHTML='<span style="width:17px;height:17px;border-radius:50%;background:'+sc.d+';display:inline-block;border:2px solid rgba(0,0,0,.1)"></span>'+sc.l+' Detected ✓';

  /* profile tags */
  var ps=document.getElementById('profStrip');
  ps.innerHTML=[
    {i:'📐',t:ST.height+'cm · '+ST.weight+'kg'},
    {i:'👤',t:getFitLabel(bt)},
    {i:'🎂',t:ag[0].toUpperCase()+ag.slice(1)+' ('+ST.age+'y)'},
    {i:'📏',t:hg},
    {i:'💡',t:'BMI '+bmi},
  ].map(function(x){return'<div class="ptag">'+x.i+' '+x.t+'</div>';}).join('');

  /* palette */
  var pal=PAL[st],pg=document.getElementById('pGrid');
  pg.innerHTML='';document.getElementById('cCnt').textContent=pal.best.length;
  pal.best.forEach(function(c){
    var d=document.createElement('div');d.className='sw';d.style.background=c.h;
    d.innerHTML='<span class="tip">'+c.n+'</span>';pg.appendChild(d);
  });

  /* avoid */
  var av=document.getElementById('avRow');av.innerHTML='';
  pal.avoid.forEach(function(c){
    var d=document.createElement('div');d.className='avchip';
    d.innerHTML='<span class="avdot" style="background:'+c.h+'"></span>'+c.n;av.appendChild(d);
  });

  /* outfit title */
  document.getElementById('outfitTitle').innerHTML=
    'Outfit Picks '
    +'<span style="font-family:DM Sans;font-weight:500;font-size:12px;color:var(--soft)">tailored for '+getFitLabel(bt)+'</span>';

  /* outfits */
  var picks=pickOutfits(g,occ,bt,ag);
  var og=document.getElementById('oGrid');og.innerHTML='';

  picks.forEach(function(o,idx){
    var photoUrl=IMG[o.img]||'';
    var fitClr=getFitColor(o.fit);
    var cstrip=o.colors.map(function(c){return'<div class="cseg" style="background:'+c+'"></div>';}).join('');
    var cdots =o.colors.map(function(c){return'<div class="cdot" style="background:'+c+'"></div>';}).join('');

    var card=document.createElement('div');
    card.className='ocard';
    card.style.animationDelay=(idx*0.08)+'s';

    card.innerHTML=
      '<div class="oimg-wrap">'
        +'<div class="shimmer" id="sh'+idx+'">👕</div>'
        +'<img src="'+photoUrl+'" alt="'+o.name+'" loading="lazy"'
        +' onload="document.getElementById(\'sh'+idx+'\').style.display=\'none\'"'
        +' onerror="document.getElementById(\'sh'+idx+'\').innerHTML=\''+encodeEmoji(o)+'\'"'
        +' style="position:relative;z-index:1"/>'
        +'<div class="fitbadge" style="background:'+fitClr+'">'+o.fit+'</div>'
        +'<div class="cstrip">'+cstrip+'</div>'
      +'</div>'
      +'<div class="oinfo">'
        +'<h4>'+o.name+'</h4>'
        +'<p>'+o.desc+'</p>'
        +'<div class="cdots">'+cdots+'</div>'
      +'</div>';

    og.appendChild(card);
  });
}

function encodeEmoji(o){
  var e=o.img.startsWith('f_')?'👗':'👔';
  return e+'<span>'+o.name+'</span>';
}

════════════════════════════════════ */
function reset(){
  document.getElementById('s2').classList.remove('on');
  document.getElementById('s1').classList.add('on');
  document.getElementById('iHex').value='';
  document.getElementById('hxp').style.background='#D2A679';
  document.getElementById('hexErr').style.display='none';
  document.body.style.background='linear-gradient(135deg,#3730A3 0%,#4F46E5 35%,#7C3AED 65%,#9333EA 100%)';
  window.scrollTo({top:0,behavior:'smooth'});
}

function copyR(){
  var skin=document.getElementById('skinB').textContent.trim();
  var bt=getBodyType(ST.height,ST.weight);
  var text='✨ ColorFit AI – My Style Profile\n\n'
    +'Skin Tone  : '+skin+'\n'
    +'Gender     : '+ST.gender+'\n'
    +'Occasion   : '+ST.occasion+'\n'
    +'Body Type  : '+getFitLabel(bt)+'\n'
    +'BMI        : '+getBMI(ST.height,ST.weight).toFixed(1)+'\n'
    +'Age Group  : '+getAgeGroup(ST.age)+'\n\n'
    +'Generated by ColorFit AI ✨';
  navigator.clipboard.writeText(text).then(function(){
    var b=document.getElementById('cpyB');
    b.classList.add('ok');b.textContent='✅ Copied!';
    showT('Copied to clipboard! 🎉');
    setTimeout(function(){b.classList.remove('ok');b.textContent='📋 Copy Results';},2500);
  }).catch(function(){showT('Copy failed — try manually');});
}

function showT(m){
  var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');
  setTimeout(function(){t.classList.remove('on');},2700);
}
